<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anil Kumar Ramavath — Azure Administrator</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg2:#111827;--card:#1a1f2e;
  --accent:#00d4ff;--accent2:#6366f1;--accent3:#818cf8;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --glass:rgba(255,255,255,.05);--glass-border:rgba(255,255,255,.08);
  --radius:16px;
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}
a{color:var(--accent);text-decoration:none;transition:color .3s}
a:hover{color:var(--accent3)}
::selection{background:var(--accent);color:var(--bg)}

/* ─── NAV ─── */
nav{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;transition:background .4s,box-shadow .4s}
nav.scrolled{background:rgba(10,14,23,.92);backdrop-filter:blur(14px);box-shadow:0 2px 20px rgba(0,0,0,.4)}
.nav-logo{font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:1.8rem;list-style:none}
.nav-links a{color:var(--text2);font-size:.9rem;font-weight:500;position:relative;padding-bottom:4px}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--accent);transition:width .3s}
.nav-links a:hover{color:var(--text)}
.nav-links a:hover::after{width:100%}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none}
.hamburger span{display:block;width:24px;height:2px;background:var(--text);transition:transform .3s,opacity .3s}

/* ─── HERO ─── */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:6rem 2rem 4rem}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(0,212,255,.08) 0%,transparent 50%)}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px}
.hero-content{position:relative;text-align:center;max-width:800px}
.hero-greeting{font-size:1.1rem;color:var(--accent);font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:.8rem;opacity:0;animation:fadeUp .8s .3s forwards}
.hero h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:800;line-height:1.1;margin-bottom:1rem;opacity:0;animation:fadeUp .8s .5s forwards}
.hero h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-title-line{color:var(--text2);font-size:clamp(1rem,2.5vw,1.5rem);font-weight:400;margin-bottom:1.5rem;opacity:0;animation:fadeUp .8s .7s forwards;display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap}
.typing-wrapper{display:inline-block;position:relative}
#typed-text{color:var(--accent);font-weight:600}
.cursor{display:inline-block;width:2px;height:1.2em;background:var(--accent);margin-left:2px;vertical-align:text-bottom;animation:blink 1s infinite}
.hero-tagline{color:var(--text3);font-size:1rem;max-width:600px;margin:0 auto 2rem;opacity:0;animation:fadeUp .8s .9s forwards}
.hero-cta{display:inline-flex;gap:1rem;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp .8s 1.1s forwards}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.8rem;border-radius:50px;font-size:.95rem;font-weight:600;transition:transform .3s,box-shadow .3s;cursor:pointer;border:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,.3);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--glass-border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
.scroll-indicator{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);opacity:0;animation:fadeUp .8s 1.4s forwards}
.scroll-indicator span{display:block;width:24px;height:38px;border:2px solid var(--text3);border-radius:12px;position:relative}
.scroll-indicator span::after{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:4px;height:8px;background:var(--accent);border-radius:2px;animation:scrollDot 2s infinite}

/* ─── SECTIONS ─── */
section{padding:5rem 2rem}
.section-inner{max-width:1100px;margin:0 auto}
.section-header{text-align:center;margin-bottom:3.5rem}
.section-label{font-size:.85rem;color:var(--accent);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem}
.section-title{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700}
.section-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ─── ABOUT ─── */
#about{background:var(--bg2)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.about-stats{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-top:2rem}
.stat-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:1.2rem;text-align:center;transition:transform .3s,border-color .3s}
.stat-card:hover{transform:translateY(-4px);border-color:var(--accent)}
.stat-number{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.8rem;color:var(--text3);margin-top:.3rem}
.about-text{color:var(--text2);font-size:1.02rem}
.about-info{display:flex;flex-direction:column;gap:.6rem;margin-top:1.5rem}
.about-info-item{display:flex;align-items:center;gap:.6rem;color:var(--text2);font-size:.95rem}
.about-info-item .label{color:var(--text3);min-width:90px;font-weight:600;font-size:.85rem}

/* ─── SKILLS ─── */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem}
.skill-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1.8rem;backdrop-filter:blur(10px);transition:transform .3s,border-color .3s,box-shadow .3s}
.skill-card:hover{transform:translateY(-6px);border-color:var(--accent);box-shadow:0 12px 40px rgba(0,212,255,.08)}
.skill-card-title{font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
.skill-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;flex-shrink:0}
.skill-tags{display:flex;flex-wrap:wrap;gap:.5rem}
.skill-tag{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15);color:var(--accent);padding:.35rem .8rem;border-radius:20px;font-size:.8rem;font-weight:500;transition:background .3s,transform .2s}
.skill-tag:hover{background:rgba(0,212,255,.18);transform:scale(1.05)}

/* ─── EXPERIENCE ─── */
#experience{background:var(--bg2)}
.timeline{position:relative;padding-left:2.5rem}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),var(--accent2),transparent)}
.timeline-item{position:relative;margin-bottom:2.5rem;opacity:0;transform:translateY(30px)}
.timeline-item.visible{opacity:1;transform:translateY(0);transition:opacity .6s,transform .6s}
.timeline-dot{position:absolute;left:-2.5rem;top:.4rem;width:14px;height:14px;background:var(--bg);border:3px solid var(--accent);border-radius:50%;transform:translateX(-6px);z-index:1}
.timeline-date{font-size:.85rem;color:var(--accent);font-weight:600;margin-bottom:.4rem}
.timeline-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:1.6rem;backdrop-filter:blur(10px);transition:border-color .3s}
.timeline-card:hover{border-color:var(--accent)}
.timeline-card h3{font-size:1.15rem;font-weight:700;margin-bottom:.3rem}
.timeline-card .company{color:var(--accent2);font-weight:500;font-size:.95rem;margin-bottom:.8rem}
.timeline-card ul{list-style:none;display:flex;flex-direction:column;gap:.5rem}
.timeline-card li{color:var(--text2);font-size:.92rem;padding-left:1.2rem;position:relative}
.timeline-card li::before{content:'▹';position:absolute;left:0;color:var(--accent);font-weight:700}

/* ─── EDUCATION & CERTS ─── */
.edu-cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.info-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:2rem;backdrop-filter:blur(10px);transition:transform .3s,border-color .3s}
.info-card:hover{transform:translateY(-4px);border-color:var(--accent)}
.info-card-label{font-size:.8rem;color:var(--accent);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem}
.info-card h3{font-size:1.15rem;font-weight:700;margin-bottom:.3rem}
.info-card p{color:var(--text2);font-size:.92rem;margin-bottom:.3rem}
.info-card .meta{color:var(--text3);font-size:.85rem}
.cert-list{display:flex;flex-direction:column;gap:1rem}
.cert-item{display:flex;align-items:flex-start;gap:.8rem}
.cert-badge{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:.85rem;flex-shrink:0}
.cert-info h4{font-size:.95rem;font-weight:600}
.cert-info p{color:var(--text3);font-size:.85rem}

/* ─── PROJECTS ─── */
#projects{background:var(--bg2)}
.projects-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.project-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:2rem;backdrop-filter:blur(10px);transition:transform .3s,border-color .3s}
.project-card:hover{transform:translateY(-6px);border-color:var(--accent)}
.project-card h3{font-size:1.1rem;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.project-card h3::before{content:'📁';font-size:1.2rem}
.project-card .badge{font-size:.7rem;background:rgba(0,212,255,.12);color:var(--accent);padding:.2rem .6rem;border-radius:10px;font-weight:600}
.project-card ul{list-style:none;margin-top:.8rem;display:flex;flex-direction:column;gap:.4rem}
.project-card li{color:var(--text2);font-size:.9rem;padding-left:1.2rem;position:relative}
.project-card li::before{content:'▹';position:absolute;left:0;color:var(--accent)}

/* ─── CONTACT ─── */
.contact-content{text-align:center;max-width:600px;margin:0 auto}
.contact-content p{color:var(--text2);font-size:1.05rem;margin-bottom:2rem}
.contact-links{display:flex;justify-content:center;gap:1.2rem;flex-wrap:wrap;margin-bottom:2rem}
.contact-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;padding:1.2rem 1.8rem;display:flex;align-items:center;gap:.8rem;transition:transform .3s,border-color .3s}
.contact-card:hover{transform:translateY(-4px);border-color:var(--accent)}
.contact-card .icon{font-size:1.3rem}
.contact-card .info{text-align:left}
.contact-card .info small{color:var(--text3);font-size:.75rem}
.contact-card .info div{color:var(--text);font-size:.9rem;font-weight:500}

/* ─── FOOTER ─── */
footer{text-align:center;padding:2rem;color:var(--text3);font-size:.85rem;border-top:1px solid var(--glass-border)}

/* ─── REVEAL ─── */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}from{opacity:0;transform:translateY(20px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes scrollDot{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(14px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ─── RESPONSIVE ─── */
@media(max-width:900px){
  .about-grid,.edu-cert-grid,.projects-grid{grid-template-columns:1fr}
  .skills-grid{grid-template-columns:1fr}
}
@media(max-width:700px){
  nav{padding:.8rem 1.2rem}
  .nav-links{position:fixed;top:0;right:-100%;width:70%;height:100vh;flex-direction:column;background:rgba(10,14,23,.97);backdrop-filter:blur(20px);padding:5rem 2rem 2rem;gap:1.8rem;transition:right .4s}
  .nav-links.open{right:0}
  .hamburger{display:flex}
  .hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
  .hamburger.active span:nth-child(2){opacity:0}
  .hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
  section{padding:3.5rem 1.2rem}
  .about-stats{grid-template-columns:1fr 1fr}
  .contact-links{flex-direction:column;align-items:center}
}
</style>
</head>
