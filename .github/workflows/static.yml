<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
// Navbar scroll
const nav=document.getElementById('navbar');
window.addEventListener('scroll',()=>{nav.classList.toggle('scrolled',window.scrollY>50)});

// Hamburger
const hamburger=document.getElementById('hamburger'),navLinks=document.getElementById('navLinks');
hamburger.addEventListener('click',()=>{hamburger.classList.toggle('active');navLinks.classList.toggle('open')});
function closeMenu(){hamburger.classList.remove('active');navLinks.classList.remove('open')}

// Typing effect
const phrases=['Azure Administrator','Cloud Operations Analyst','M365 Administrator','Identity & Access Specialist','Infrastructure Engineer'];
let pi=0,ci=0,deleting=false;
const typedEl=document.getElementById('typed-text');
function typeEffect(){
  const current=phrases[pi];
  if(!deleting){
    typedEl.textContent=current.substring(0,ci+1);ci++;
    if(ci===current.length){deleting=true;setTimeout(typeEffect,1800);return}
    setTimeout(typeEffect,80);
  }else{
    typedEl.textContent=current.substring(0,ci-1);ci--;
    if(ci===0){deleting=false;pi=(pi+1)%phrases.length;setTimeout(typeEffect,400);return}
    setTimeout(typeEffect,40);
  }
}
typeEffect();

// Intersection Observer for reveals
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target)}})
},{threshold:0.1,rootMargin:'0px 0px -50px 0px'});
document.querySelectorAll('.reveal,.timeline-item').forEach(el=>observer.observe(el));

// Active nav link
const sections=document.querySelectorAll('section[id]');
const navLinksAll=document.querySelectorAll('.nav-links a');
window.addEventListener('scroll',()=>{
  let current='';
  sections.forEach(s=>{if(window.scrollY>=s.offsetTop-200)current=s.getAttribute('id')});
  navLinksAll.forEach(a=>{a.style.color=a.getAttribute('href')==='#'+current?'var(--accent)':''});
});
</script>
